#cloud-config
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - rsync
  - python3

write_files:
  - path: /etc/motd
    permissions: "0644"
    content: |
      Clawback Hetzner rehearsal VM
      This host is intended for temporary single-node deployment verification.

runcmd:
  - [sh, -lc, "echo cloud-init-ready >/var/tmp/clawback-cloud-init-ready"]
