name: Public CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "CHANGELOG.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "CHANGELOG.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployed-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deployed-stack acceptance
        run: pnpm test:deployed-stack
